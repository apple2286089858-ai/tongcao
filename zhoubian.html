    const QA = [

        answer:
          "通草堆画是一种以通草髓片为材料的立体堆贴工艺。\n" +
          "匠人将通草裁成薄片并染色，再逐层堆贴形成花鸟、人物等题材，层次分明、轻盈细腻。"

          "1) 裁剪通草片（必要时先染色）\n" +
          "2) 分层堆贴（由里到外、由浅到深）\n" +
          "3) 刀尖修整弧度与纹理（比如羽毛、花瓣边缘）\n" +

          "主要难点：\n" +
          "① 通草片很薄，上胶力度要稳；\n" +
          "② 层次堆贴要“堆得准”，不然立体感会乱；\n" +
          "③ 羽毛/花瓣纹理靠刀工，刮深就不可逆。"
      }
    ];
  
    function matchPreset(userText){
      const t = userText.replace(/\s+/g,'').toLowerCase();
      for(const item of QA){
        for(const k of item.keys){
          const key = k.replace(/\s+/g,'').toLowerCase();
          if(t.includes(key)) return item.answer;
        }
      }
      return null;
    }
  
    // ====== 让面板紧贴悬浮球展开 ======
    function positionPanelNearFloat(){
      panel.style.right = 'auto';
      panel.style.bottom = 'auto';
  
      const fr = floatBtn.getBoundingClientRect();
      const gap = 14;
      const pw = panel.offsetWidth || 360;
      const ph = panel.offsetHeight || 520;
  
      let left = fr.right + gap;
      let top  = fr.top + (fr.height/2) - (ph/2);
  
      if(left + pw > window.innerWidth - 8){
        left = fr.left - gap - pw;
      }
  
      left = clamp(left, 8, window.innerWidth - pw - 8);
      top  = clamp(top,  8, window.innerHeight - ph - 8);
  
      panel.style.left = left + 'px';
      panel.style.top  = top  + 'px';
    }
  
    // ====== 打开/关闭 ======
    function openPanel(){
      panel.classList.add('open');
      requestAnimationFrame(positionPanelNearFloat);
    }
    function closePanel(){ panel.classList.remove('open'); }
    function togglePanel(){
      if(panel.classList.contains('open')) closePanel();
      else openPanel();
    }
  
    closeBtn.addEventListener('click', closePanel);
  
    document.addEventListener('click', (e) => {
      if(panel.classList.contains('open') &&
         !panel.contains(e.target) &&
         !floatBtn.contains(e.target)){
        closePanel();
      }
    });
  
    // ====== 清空对话（仅 UI） ======
    clearBtn.addEventListener('click', () => {
      msgs.innerHTML = '<div class="bubble ai">已清空～继续问我吧！</div>';
    });
  
    // ====== 加气泡 ======
    function addBubble(content, who='me'){
      const div = document.createElement('div');
      div.className = 'bubble ' + (who === 'me' ? 'me' : 'ai');
      div.textContent = content;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }
  
    // ====== AI 回复（✅ 只有一个 fakeAIReply） ======
    function fakeAIReply(userText){
      const preset = matchPreset(userText);
      if(preset){
        setTimeout(()=> addBubble(preset, 'ai'), 160);
        return;
      }
  
      const reply =
        "我可以回答这些通草堆画常见问题：\n" +
        "• 通草堆画是什么\n• 通草堆画怎么做\n• 制作难点\n\n" +
        "你也可以直接把你想问的句子发我～";
      setTimeout(()=> addBubble(reply, 'ai'), 200);
    }
  
    function onSend(){
      const v = text.value.trim();
      if(!v) return;
      addBubble(v, 'me');
      text.value = '';
      text.style.height = '40px';
      fakeAIReply(v);
    }
  
    send.addEventListener('click', onSend);
    text.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        onSend();
      }
    });
    text.addEventListener('input', () => {
      text.style.height = '40px';
      text.style.height = Math.min(text.scrollHeight, 120) + 'px';
    });
  
    // ====== 拖动：Pointer Events ======
    let dragging = false;
    let moved = false;
    let offsetX = 0, offsetY = 0;
  
    const saved = localStorage.getItem('aiFloatPos');
    if(saved){
      try{
        const {left, top} = JSON.parse(saved);
        floatBtn.style.left = left + 'px';
        floatBtn.style.top = top + 'px';
        floatBtn.style.right = 'auto';
        floatBtn.style.transform = 'none';
      }catch(e){}
    }else{
      const r = floatBtn.getBoundingClientRect();
      floatBtn.style.left = r.left + 'px';
      floatBtn.style.top = r.top + 'px';
      floatBtn.style.right = 'auto';
      floatBtn.style.transform = 'none';
    }
  
    floatBtn.addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      dragging = true;
      moved = false;
      floatBtn.setPointerCapture(e.pointerId);
  
      const r = floatBtn.getBoundingClientRect();
      offsetX = e.clientX - r.left;
      offsetY = e.clientY - r.top;
    });
  
    floatBtn.addEventListener('contextmenu', (e) => e.preventDefault());
    floatBtn.addEventListener('pointercancel', () => { dragging = false; });
  
    floatBtn.addEventListener('pointermove', (e) => {
      if(!dragging) return;
  
      if(Math.abs(e.movementX) + Math.abs(e.movementY) > 2) moved = true;
  
      const w = floatBtn.offsetWidth;
      const h = floatBtn.offsetHeight;
  
      let left = e.clientX - offsetX;
      let top  = e.clientY - offsetY;
  
      left = clamp(left, 8, window.innerWidth - w - 8);
      top  = clamp(top,  8, window.innerHeight - h - 8);
  
      floatBtn.style.left = left + 'px';
      floatBtn.style.top  = top  + 'px';
      localStorage.setItem('aiFloatPos', JSON.stringify({left, top}));
  
      if(panel.classList.contains('open')) positionPanelNearFloat();
    });
  
    floatBtn.addEventListener('pointerup', () => {
      dragging = false;
  
      if(!moved){
        togglePanel();
        return;
      }
  
      const rect = floatBtn.getBoundingClientRect();
      localStorage.setItem('aiFloatPos', JSON.stringify({ left: rect.left, top: rect.top }));
    });
  
    window.addEventListener('resize', () => {
      const r = floatBtn.getBoundingClientRect();
      const w = r.width;
      const h = r.height;
      const left = clamp(r.left, 8, window.innerWidth - w - 8);
      const top  = clamp(r.top,  8, window.innerHeight - h - 8);
      floatBtn.style.left = left + 'px';
      floatBtn.style.top  = top  + 'px';
      localStorage.setItem('aiFloatPos', JSON.stringify({left, top}));
  
      if(panel.classList.contains('open')) positionPanelNearFloat();
    });
  
  })();
  </script>
</body>
</html>
